        file: content/translations/services.json
        format: json
        fields:
          - label: English (en)
            name: en
            widget: object
            fields:
              - { label: Nav labels, name: nav, widget: object, fields: [
                    { label: ISO Implementation, name: implementation, widget: string },
                    { label: Internal Auditing, name: "internal-auditing", widget: string },
                    { label: ISO Maintenance, name: "iso-maintenance", widget: string },
                    { label: Food Safety & HACCP, name: "food-safety-haccp", widget: string },
                    { label: Lead Auditing, name: "lead-auditing", widget: string }
                ] }
              - { label: Contact select, name: contact, widget: object, fields: [
                    { label: ISO Implementation, name: implementation, widget: string },
                    { label: Internal Audit Support, name: "internal-auditing", widget: string },
                    { label: ISO Maintenance, name: "iso-maintenance", widget: string },
                    { label: Food Safety & HACCP, name: "food-safety-haccp", widget: string },
                    { label: Lead Auditor Services, name: "lead-auditing", widget: string },
                    { label: Other, name: other, widget: string }
                ] }
              - { label: Taglines, name: taglines, widget: object, fields: [
                    { label: Making ISO Practical (Implementation), name: implementation, widget: string },
                    { label: Structured Audit Control (Internal Auditing), name: "internal-auditing", widget: string },
                    { label: Ongoing ISO Support (Maintenance), name: "iso-maintenance", widget: string },
                    { label: Food Safety Made Practical (Food Safety), name: "food-safety-haccp", widget: string }
                ] }
