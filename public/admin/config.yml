backend:
  name: github
  repo: whatmusic69-commits/isologic-site
  branch: main
  base_url: https://www.isologic.lv
  auth_endpoint: api/auth

display_url: https://www.isologic.lv
media_folder: "public/uploads"
public_folder: "/uploads"


collections:
  # TRANSLATIONS
  - name: translations
    label: Translations
    files:
      - label: UI (nav/footer)
        name: ui_translations
        file: content/translations/ui.json
        format: json
        fields:
          - label: Latvian (lv)
            name: lv
            widget: object
            fields:
              - { label: Nav, name: nav, widget: object, fields: [
                  { label: Home, name: home, widget: string },
                  { label: About, name: about, widget: string },
                  { label: Services, name: services, widget: string },
                  { label: Contact, name: contact, widget: string },
                  { label: FAQs, name: faq, widget: string }
                ] }
              - label: Footer
                name: footer
                widget: object
                fields:
                  - { label: Tagline, name: tagline, widget: string }
                  - { label: Quick Links, name: quickLinks, widget: string }
                  - { label: Contact, name: contact, widget: string }
                  - label: Links
                    name: links
                    widget: object
                    fields:
                      - { label: Home, name: home, widget: string }
                      - { label: About, name: about, widget: string }
                      - { label: Services, name: services, widget: string }
                      - { label: FAQs, name: faq, widget: string }
                      - { label: Contact, name: contact, widget: string }
                      - { label: Privacy, name: privacy, widget: string }
                  - { label: Rights, name: rights, widget: string }
          - label: English (en)
            name: en
            widget: object
            fields:
              - { label: Nav, name: nav, widget: object, fields: [
                  { label: Home, name: home, widget: string },
                  { label: About, name: about, widget: string },
                  { label: Services, name: services, widget: string },
                  { label: Contact, name: contact, widget: string },
                  { label: FAQs, name: faq, widget: string }
                ] }
              - label: Footer
                name: footer
                widget: object
                fields:
                  - { label: Tagline, name: tagline, widget: string }
                  - { label: Quick Links, name: quickLinks, widget: string }
                  - { label: Contact, name: contact, widget: string }
                  - label: Links
                    name: links
                    widget: object
                    fields:
                      - { label: Home, name: home, widget: string }
                      - { label: About, name: about, widget: string }
                      - { label: Services, name: services, widget: string }
                      - { label: FAQs, name: faq, widget: string }
                      - { label: Contact, name: contact, widget: string }
                      - { label: Privacy, name: privacy, widget: string }
                  - { label: Rights, name: rights, widget: string }
          - label: Russian (ru)
            name: ru
            widget: object
            fields:
              - { label: Nav, name: nav, widget: object, fields: [
                  { label: Home, name: home, widget: string },
                  { label: About, name: about, widget: string },
                  { label: Services, name: services, widget: string },
                  { label: Contact, name: contact, widget: string },
                  { label: FAQs, name: faq, widget: string }
                ] }
              - label: Footer
                name: footer
                widget: object
                fields:
                  - { label: Tagline, name: tagline, widget: string }
                  - { label: Quick Links, name: quickLinks, widget: string }
                  - { label: Contact, name: contact, widget: string }
                  - label: Links
                    name: links
                    widget: object
                    fields:
                      - { label: Home, name: home, widget: string }
                      - { label: About, name: about, widget: string }
                      - { label: Services, name: services, widget: string }
                      - { label: FAQs, name: faq, widget: string }
                      - { label: Contact, name: contact, widget: string }
                      - { label: Privacy, name: privacy, widget: string }
                  - { label: Rights, name: rights, widget: string }

      - label: Service labels (nav + contact)
