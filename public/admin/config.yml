                  - { label: Text, name: text, widget: text }
          - label: Industries
            name: industriesSection
            widget: object
            required: false
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: text, required: false }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Icon, name: icon, widget: string, required: false }
          - label: Standards Section
            name: standardsSection
            widget: object
            required: false
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: text, required: false }
              - { label: CTA Text, name: ctaText, widget: string, required: false }
              - { label: CTA Href, name: ctaHref, widget: string, required: false }
              - label: Groups
                name: groups
                widget: list
                required: false
                fields:
                  - { label: Title, name: title, widget: string }
                  - label: Bullets
                    name: bullets
                    widget: list
                    field: { label: Item, name: item, widget: string }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Icon, name: icon, widget: string, required: false }
          - label: Why Choose (New Grid)
            name: whyChoose
            widget: object
            required: false
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: text, required: false }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
                  - { label: Icon, name: icon, widget: string, required: false }
          - label: Ownership Section
            name: ownershipSection
            widget: object
            required: false
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: text, required: false }
              - { label: Button Text, name: buttonText, widget: string, required: false }
              - { label: Button Href, name: buttonHref, widget: string, required: false }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Eyebrow, name: eyebrow, widget: string, required: false }
                  - { label: Description, name: description, widget: text, required: false }
                  - { label: Icon, name: icon, widget: string, required: false }
          - label: Testimonials Section
            name: testimonialsSection
            widget: object
            required: false
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: text, required: false }
              - { label: Rotation Interval (ms), name: rotationIntervalMs, widget: number, required: false }
              - { label: Author Name, name: authorName, widget: string, required: false }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Quote, name: quote, widget: text }
                  - { label: Author Name, name: authorName, widget: string }
                  - { label: Author Role, name: authorRole, widget: string, required: false }
                  - { label: Company, name: company, widget: string, required: false }
                  - { label: Rating, name: rating, widget: number, min: 1, max: 5, required: false }
                  - { label: Avatar Image, name: avatarSrc, widget: image, required: false }
          - label: Stats
            name: stats
            widget: object
            required: false
            fields:
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Value, name: value, widget: string }
                  - { label: Label, name: label, widget: string }
          - label: CTA Band
