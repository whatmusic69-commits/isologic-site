                    { label: Implementation tagline, name: implementation, widget: string },
                    { label: Internal Auditing tagline, name: "internal-auditing", widget: string },
                    { label: Maintenance tagline, name: "iso-maintenance", widget: string },
                    { label: Food Safety tagline, name: "food-safety-haccp", widget: string }
                ] }
          - label: Russian (ru)
            name: ru
            widget: object
            fields:
              - { label: Nav labels, name: nav, widget: object, fields: [
                    { label: Внедрение ISO, name: implementation, widget: string },
                    { label: Внутренний аудит, name: "internal-auditing", widget: string },
                    { label: Поддержка ISO, name: "iso-maintenance", widget: string },
                    { label: Пищевая безопасность и HACCP, name: "food-safety-haccp", widget: string },
