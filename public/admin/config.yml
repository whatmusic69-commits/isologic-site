                    { label: Vadošā auditora pakalpojumi, name: "lead-auditing", widget: string }
                ] }
              - { label: Contact select, name: contact, widget: object, fields: [
                    { label: ISO ieviešana, name: implementation, widget: string },
                    { label: Iekšējā audita atbalsts, name: "internal-auditing", widget: string },
                    { label: ISO uzturēšana, name: "iso-maintenance", widget: string },
                    { label: Pārtikas drošība un HACCP, name: "food-safety-haccp", widget: string },
                    { label: Vadošā auditora pakalpojumi, name: "lead-auditing", widget: string },
                    { label: Cits, name: other, widget: string }
