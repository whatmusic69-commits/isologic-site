  # HOME PAGE
  - name: home
    label: Home
    files:
      - label: Home (LV)
        name: home_lv
        file: content/pages/home/lv.json
        format: json
        fields:
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: text, required: false }
              - { label: Image Alt, name: imageAlt, widget: string, required: false }
              - label: Paragraphs
                name: paragraphs
                widget: list
                required: false
                field: { label: Paragraph, name: paragraph, widget: text }
              - label: Checklist
                name: checklist
                widget: list
                required: false
                field: { label: Item, name: item, widget: string }
              - { label: Primary CTA Label, name: primaryCtaLabel, widget: string, required: false }
              - { label: Primary CTA Href, name: primaryCtaHref, widget: string, required: false }
              - { label: Secondary CTA Label, name: secondaryCtaLabel, widget: string, required: false }
              - { label: Secondary CTA Href, name: secondaryCtaHref, widget: string, required: false }
          - label: Intro
            name: intro
            widget: object
            required: false
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Text, name: text, widget: text, required: false }
          - label: Services Preview
            name: servicesPreview
            widget: object
            required: false
            fields:
              - { label: Title, name: title, widget: string }
              - label: Cards
                name: cards
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
          - label: Benefits (legacy layout)
            name: benefits
            widget: object
            required: false
            fields:
              - { label: Title, name: title, widget: string }
              - label: Items
                name: items
                widget: list
                fields:
